bot:
  max_session_messages: 2000
  max_daily_messages: 2000  # Maximum messages per day across all users
  max_replies_per_user: 15 # Consistent limit for all bots
  link_config:
    min_replies_before_link: 8
    max_replies_before_link: 15
    force_link_probability: 0.3 # Chance to force link after min_replies
  headless: true # Recommended false for guest entry to verify dropdowns
  delay_min: 2
  delay_max: 8
  session_file: "session.json"
  session_file: "session.json"
  session_file: "session.json"
  log_file: "conversation_logs.txt"
  broadcast_interval: 120
  allowed_domain: "chatib.us" # Domain lock for security

selectors:
  # Guest Entry Page
  entry_url: "https://www.chatib.us/" # Main page usually has the guest form
  
  # Form Fields (Verified from HTML)
  username_input: "#username"
  gender_female_radio: "input[name='sexe'][value='femme']"
  gender_male_radio: "input[name='sexe'][value='homme']"
  age_dropdown: "#age"
  country_dropdown: "#login_country"
  state_dropdown: "#city" # NOTE: The HTML names this 'city' but it contains States
  start_chat_btn: "#startChatNow"
  agree_btn: "button.agree"
  
  # Navigation / Tabs
  # Found via HTML: <a href="#" id="inboxicon" ...>
  inbox_tab: "li.inbox" # Updated from #inboxicon to target the container 
  
  # Inbox / User List
  inbox_list: ".inbox_desc_history"
  inbox_item: ".list-group-item"
  unread_badge: ".meta-circle.red" # The red circle with number
  back_to_inbox_btn: ".hide_messages" # The "Users" back arrow
  
  # Ad / Modal Handling
  ad_dismiss_btn: "#dismiss-button" # Common Google Vignette close button
  ad_overlay: ".google-auto-placed, #google_vignette" # Detects if ad is present

  # Chat Interface
  chat_url: "https://www.chatib.us/chat"
  chat_history_container: ".chat-history"
  # The input is complex. We try the main input. If hidden, we use contenteditable.
  message_input: "#msg_content" 
  send_btn: ".msg_send_btn"
  incoming_message_bubble: ".message.incoming"

wireclub:
