version: 2.1

jobs:
  run-bot:
    docker:
      - image: cimg/python:3.12-browsers
    resource_class: medium
    steps:
      - checkout
      - run:
          name: Install Dependencies
          command: pip install -r requirements.txt
      - run:
          name: Install Playwright Browsers
          command: |
            playwright install chromium
            playwright install-deps
      - run:
          name: Run Bot
          environment:
            HEADLESS: "true"
          command: python main.py --duration 5400
      - store_artifacts:
          path: stats.json
      - store_artifacts:
          path: conversation_logs.txt

workflows:
  version: 2
  scheduled-bot-run:
    triggers:
      - schedule:
          cron: "0 09,11 * * *"
          filters:
            branches:
              only:
                - main
    jobs:
      - run-bot
