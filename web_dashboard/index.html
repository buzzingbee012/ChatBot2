<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatBot Monitor | Premium</title>
    <link rel="stylesheet" href="style.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
</head>

<body>
    <header>
        <h1><span class="status-dot pulse"></span>Web Automator Dashboard</h1>
        <p style="color: var(--text-secondary); margin-top: 10px;">Real-time Performance Metrics & Control</p>
    </header>

    <!-- Bot Control Panel -->
    <div class="card" style="margin-bottom: 40px; max-width: 600px; margin-left: auto; margin-right: auto;">
        <div class="card-title">Bot Remote Control</div>
        <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 15px;">
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <div style="flex: 1; min-width: 200px;">
                    <label style="font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 5px; display: block;">GitHub PAT (token)</label>
                    <input type="password" id="gh-token" placeholder="ghp_..." style="width: 100%; padding: 10px; border-radius: 6px; border: var(--card-border); background: var(--bg-color); color: var(--text-primary); box-sizing: border-box;">
                </div>
                <div style="flex: 1; min-width: 200px;">
                    <label style="font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 5px; display: block;">Repository (owner/repo)</label>
                    <input type="text" id="gh-repo" placeholder="user/repo" style="width: 100%; padding: 10px; border-radius: 6px; border: var(--card-border); background: var(--bg-color); color: var(--text-primary); box-sizing: border-box;">
                </div>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 5px;">
                <button id="btn-start" class="btn btn-primary" onclick="triggerGitHubAction()" style="flex: 1; padding: 12px; border-radius: 6px; border: none; background: #238636; color: white; cursor: pointer; font-weight: 600;">Start Bot</button>
                <button id="btn-stop" class="btn btn-danger" onclick="stopGitHubAction()" style="flex: 1; padding: 12px; border-radius: 6px; border: none; background: #da3633; color: white; cursor: pointer; font-weight: 600;">Stop Bot</button>
            </div>
            <div id="control-status" style="font-size: 0.85rem; text-align: center; color: var(--text-secondary);">Ready</div>
        </div>
    </div>


    <div class="stats-grid">
        <div class="card">
            <div class="card-title">Interactions Today</div>
            <div class="card-value" id="today-interactions">0</div>
        </div>
        <div class="card">
            <div class="card-title">Tokens Used Today</div>
            <div class="card-value" id="today-tokens">0</div>
        </div>
        <div class="card">
            <div class="card-title">Total Interactions</div>
            <div class="card-value" id="total-interactions">0</div>
        </div>
        <div class="card">
            <div class="card-title">Total Tokens Used</div>
            <div class="card-value" id="total-tokens">0</div>
        </div>
        <div class="card">
            <div class="card-title">Errors Today</div>
            <div class="card-value" id="today-errors" style="color: #ff7b72; -webkit-text-fill-color: initial;">0</div>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="activityChart"></canvas>
    </div>

    <!-- History Table -->
    <div class="recent-activity" style="margin-top: 40px; margin-bottom: 40px;">
        <h2 style="color: var(--text-primary); margin-bottom: 20px;">History</h2>
        <div style="background: var(--card-bg); border-radius: 12px; border: var(--card-border); overflow: hidden;">
            <table style="width: 100%; border-collapse: collapse; color: var(--text-primary);">
                <thead>
                    <tr style="background: rgba(240, 246, 252, 0.05); text-align: left;">
                        <th style="padding: 15px; color: var(--text-secondary);">Date</th>
                        <th style="padding: 15px; color: var(--text-secondary);">Interactions</th>
                        <th style="padding: 15px; color: var(--text-secondary);">Tokens</th>
                    </tr>
                </thead>
                <tbody id="history-table-body">
                    <!-- Rows will be injected here -->
                </tbody>
            </table>
        </div>
    </div>

    <div class="recent-activity">
        <h2 style="color: var(--text-primary); margin-bottom: 20px;">Recent Errors / Logs</h2>
        <div id="log-container">
            <!-- Logs will be injected here -->
            <div class="log-entry" style="justify-content: center; color: var(--text-secondary);">Waiting for data...
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>

</html>
