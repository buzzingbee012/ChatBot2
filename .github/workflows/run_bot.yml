name: Run Bot Daily

on:
  schedule:
    # 11 AM EST (16:00 UTC) and 1 PM EST (18:00 UTC)
    - cron: '0 19 * * *'
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-22.04
    container: mcr.microsoft.com/playwright/python:v1.41.0-jammy
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip3 install -r requirements.txt

    - name: Run Bot
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        WIRECLUB_EMAIL: ${{ secrets.WIRECLUB_EMAIL }}
        WIRECLUB_PASSWORD: ${{ secrets.WIRECLUB_PASSWORD }}
        WIRECLUB_USERNAME: ${{ secrets.WIRECLUB_USERNAME }}
        SITE_TWO_USERNAME: ${{ secrets.SITE_TWO_USERNAME }}
        FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
        HEADLESS: "true"
      run: python3 main.py --duration 3600 --site2-count 4 --ib-count 2 --wire-count 1
      
    - name: Commit and Push Stats
      run: |
        git config --global user.name "Stats Bot"
        git config --global user.email "bot@github-actions"
        git add -f stats.json
        git add -f conversation_logs.txt || true
        git commit -m "Update daily stats [skip ci]" || exit 0
        git push
      
    - name: Upload Logs & Stats
      if: always() # Run even if bot fails
      uses: actions/upload-artifact@v4
      with:
        name: bot-logs-and-stats
        path: |
          stats.json
          conversation_logs.txt
          *.png

