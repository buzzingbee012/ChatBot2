name: Run Bot Daily

on:
  schedule:
    # 1 PM EST is 18:00 UTC
    - cron: '0 18 * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        playwright install chromium
        playwright install-deps

    - name: Run Bot
      run: python main.py --duration 3600
      
    - name: Upload Logs & Stats
      if: always() # Run even if bot fails
      uses: actions/upload-artifact@v4
      with:
        name: bot-logs-and-stats
        path: |
          stats.json
          conversation_logs.txt
          *.png

