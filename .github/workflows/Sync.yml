name: Sync to Multiple Accounts

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source (Repo A)
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      # --- SYNC TO REPO B ---
      - name: Sync to Repo B
        env:
          SEC_TOKEN: ${{ secrets.SECONDARY_ACCOUNT_TOKEN }}
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"

          # CLEANUP: Remove 'second' if it exists from a previous run or step
          git remote remove second || true 

          git remote add second https://${SEC_TOKEN}@github.com/AIBots012/ChatBot.git
          git fetch second main
          git checkout -b repo-b-branch second/main
          
          # Merge Repo A into B, favoring Repo A's files in conflicts
          git merge origin/main --allow-unrelated-histories -X theirs -m "Sync from Repo A"
          
          # RESTORE Repo B's unique workflows
          git checkout second/main -- .github/workflows
          
          git push second repo-b-branch:main

      # --- SYNC TO REPO C ---
      - name: Sync to Repo C
        env:
          SEC_TOKEN: ${{ secrets.THIRD_ACCOUNT_TOKEN }}
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git remote remove target || true 
          git remote add target https://${SEC_TOKEN}@github.com/AIBots1/ChatBot.git

          # 1. Check if the remote repository has any commits
          # We check if 'HEAD' exists on the remote. 
          if git ls-remote --exit-code target HEAD; then
            echo "Repo C has content. Proceeding with merge..."
            
            # Detect if it uses main or master
            REMOTE_BRANCH=$(git ls-remote --heads target | grep -E 'refs/heads/(main|master)' | cut -f2 | sed 's/refs\/heads\///' | head -n 1)
            
            git fetch target $REMOTE_BRANCH
            git checkout -b temp-sync-c target/$REMOTE_BRANCH
            
            # Merge changes from Repo A (origin/main)
            git merge origin/main --allow-unrelated-histories -X theirs -m "Sync from Repo A"
            
            # Restore Repo C's workflows (if they exist)
            git checkout target/$REMOTE_BRANCH -- .github/workflows || echo "No workflows to restore"
            
            git push target temp-sync-c:$REMOTE_BRANCH
          else
            echo "Repo C is empty. Initializing with Repo A content..."
            # Since Repo C is empty, we just push our current main branch 
            # and ignore the workflow exclusion this one time (or you can delete them first)
            
            # OPTIONAL: Remove workflows before the first push to keep Repo C clean
            git rm -rf .github/workflows --ignore-unmatch
            git commit -m "Initial sync - removing workflows" || echo "Nothing to remove"
            
            git push target main:main
          fi
