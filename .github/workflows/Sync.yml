name: Sync to Secondary Account

on:
  push:
    branches:
      - main  # or master, depending on your default branch name

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Push to Account B
        env:
          SEC_TOKEN: ${{ secrets.SECONDARY_ACCOUNT_TOKEN }}
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git remote add second https://${SEC_TOKEN}@github.com/AIBots012/ChatBot.git
          git push second main --force
