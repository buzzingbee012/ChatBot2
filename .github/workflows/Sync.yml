name: Sync to Secondary Account

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Sync and Merge (Preserving Repo B Workflows)
        env:
          SEC_TOKEN: ${{ secrets.SECONDARY_ACCOUNT_TOKEN }}
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"

          # 1. Add Repo B as a remote and fetch its content
          git remote add second https://${SEC_TOKEN}@github.com/AIBots012/ChatBot.git
          git fetch second main

          # 2. Checkout the 'main' branch of Repo B locally
          git checkout -b repo-b-branch second/main

          # 3. Merge Repo A's code into Repo B's code
          # 'allow-unrelated-histories' is used if the repos were created separately
          git merge origin/main --allow-unrelated-histories -m "Sync from Repo A"

          # 4. RESTORE Repo B's workflows from the fetch we just did
          # This overwrites any incoming workflows with what was already in Repo B
          git checkout second/main -- .github/workflows

          # 5. Push the combined result back to Repo B
          git push second repo-b-branch:main

      - name: Sync and Merge (Preserving Repo C Workflows)
        env:
          SEC_TOKEN: ${{ secrets.THIRD_ACCOUNT_TOKEN }}
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"

          # 1. Add Repo B as a remote and fetch its content
          git remote add second https://${SEC_TOKEN}@github.com/AIBots1/ChatBot.git
          git fetch second main

          # 2. Checkout the 'main' branch of Repo B locally
          git checkout -b repo-b-branch second/main

          # 3. Merge Repo A's code into Repo B's code
          # 'allow-unrelated-histories' is used if the repos were created separately
          git merge origin/main --allow-unrelated-histories -m "Sync from Repo A"

          # 4. RESTORE Repo B's workflows from the fetch we just did
          # This overwrites any incoming workflows with what was already in Repo C
          git checkout second/main -- .github/workflows

          # 5. Push the combined result back to Repo C
          git push second repo-b-branch:main

